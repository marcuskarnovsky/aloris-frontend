<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALORIS</title>

<style>
:root {
    --bg-main: #1e1f22;
    --bg-chat: #2a2b2f;
    --text-main: #e5e7eb;
    --border-color: #3a3b40;
    --user-color: #3b82f6;
    --bot-color: #3f6f5c;
    --input-bg: #1f2023;
    --font-size: 15px;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    display: flex;
    justify-content: center;
    height: 100vh;
}

/* Container */
.chat-container {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    background: var(--bg-chat);
}

/* Header */
.header {
    padding: 18px;
    font-weight: 600;
    font-size: 18px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.settings-btn {
    cursor: pointer;
    font-size: 18px;
}

/* Messages */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: var(--font-size);
}

.message {
    padding: 12px 16px;
    border-radius: 18px;
    max-width: 75%;
}

.user {
    background: var(--user-color);
    color: white;
    align-self: flex-end;
}

.bot {
    background: var(--bot-color);
    color: white;
    align-self: flex-start;
}

/* Input Area */
.input-area {
    padding: 14px;
    border-top: 1px solid var(--border-color);
}

.controls {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
}

.icon-btn {
    padding: 10px 14px;
    border-radius: 50%;
    border: none;
    background: var(--border-color);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Input Row */
.input-row {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 28px;
    border: 1px solid var(--border-color);
    background: var(--input-bg);
    color: var(--text-main);
    font-size: var(--font-size);
}

.send-btn {
    padding: 14px 22px;
    border-radius: 28px;
    border: none;
    background: #111827;
    color: white;
    cursor: pointer;
}

/* Modal */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #2a2b2f;
    padding: 20px;
    border-radius: 12px;
    width: 85%;
    max-width: 400px;
}

/* Theme Buttons */
.theme-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.theme-btn {
    flex: 1;
    height: 40px;
    border-radius: 8px;
    cursor: pointer;
}

.theme-dark { background: #1e1f22; }
.theme-light { background: #f2f2f2; }
.theme-contrast { background: black; }

/* Font Buttons */
.font-row {
    display: flex;
    gap: 10px;
}

.font-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #3a3b40;
    color: white;
    transition: transform 0.2s ease;
}

.font-btn:hover {
    transform: scale(1.05);
}

.font-small { font-size: 14px; }
.font-medium { font-size: 18px; }
.font-large { font-size: 24px; }

</style>
</head>

<body>

<div class="chat-container">
    <div class="header">
        ALORIS
        <div class="settings-btn" onclick="openSettings()">⚙️</div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <div class="controls">
            <button class="icon-btn">✏️</button>
            <button class="icon-btn">🎤</button>
            <button class="icon-btn">📎</button>
        </div>

        <div class="input-row">
            <input id="userInput" placeholder="..." />
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">

        <!-- Theme -->
        <div class="theme-row">
            <div class="theme-btn theme-dark" onclick="setTheme('dark')"></div>
            <div class="theme-btn theme-light" onclick="setTheme('light')"></div>
            <div class="theme-btn theme-contrast" onclick="setTheme('contrast')"></div>
        </div>

        <!-- Font Size -->
        <div class="font-row">
            <button class="font-btn font-small" onclick="setFontSize('15px')">A</button>
            <button class="font-btn font-medium" onclick="setFontSize('18px')">A</button>
            <button class="font-btn font-large" onclick="setFontSize('22px')">A</button>
        </div>

    </div>
</div>

<script>
const root = document.documentElement;
const modal = document.getElementById("settingsModal");

function setTheme(mode) {
    if (mode === "light") {
        root.style.setProperty("--bg-main", "#f2f2f2");
        root.style.setProperty("--bg-chat", "#ffffff");
        root.style.setProperty("--text-main", "#111");
    }
    if (mode === "dark") {
        root.style.setProperty("--bg-main", "#1e1f22");
        root.style.setProperty("--bg-chat", "#2a2b2f");
        root.style.setProperty("--text-main", "#e5e7eb");
    }
    if (mode === "contrast") {
        root.style.setProperty("--bg-main", "#000");
        root.style.setProperty("--bg-chat", "#111");
        root.style.setProperty("--text-main", "#ffffff");
    }
}

function setFontSize(size) {
    root.style.setProperty("--font-size", size);
}

function openSettings() {
    modal.style.display = "flex";
}

// ✅ Close when clicking outside
modal.addEventListener("click", function(e) {
    if (e.target === modal) {
        modal.style.display = "none";
    }
});

function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";
}

function addMessage(text, sender) {
    const messages = document.getElementById("messages");
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
